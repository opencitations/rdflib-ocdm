name: Run tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  CheckCoverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Setup Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --with dev

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Start test databases
      run: |
        chmod +x ./test/start-test-databases.sh
        ./test/start-test-databases.sh

    - name: Run tests with coverage
      run: |
        poetry run python -m coverage run --rcfile=test/coverage/.coveragerc
        poetry run coverage xml
        poetry run coverage report

    - name: Stop test databases
      if: always()
      run: |
        chmod +x ./test/stop-test-databases.sh
        ./test/stop-test-databases.sh

    - name: Generate HTML coverage report
      if: matrix.python-version == '3.12'
      run: poetry run coverage html -d htmlcov

    - name: Generate coverage badge
      if: matrix.python-version == '3.12'
      run: poetry run genbadge coverage -i coverage.xml -o coverage-badge.svg

    - name: Upload coverage report
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: htmlcov

    - name: Upload coverage badge
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-badge
        path: coverage-badge.svg

  deploy-pages:
    needs: CheckCoverage
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v7
        with:
          name: coverage-report
          path: coverage
        continue-on-error: true

      - name: Download coverage badge
        uses: actions/download-artifact@v7
        with:
          name: coverage-badge
          path: coverage
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: coverage

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
